name: Core Engine CI Tests

# Yeh workflow tab chalega jab koi 'feat/tensor' branch par push ya pull request karega
on:
  push:
    branches: [ "main", "test/ci-setup" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest # Kyunki project Linux (Ubuntu/Arch) par based hai 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (CMake & Compilers)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ build-essential

    - name: Configure CMake
      # Project ko build folder mein configure karega 
      run: cmake -B build -S .

    - name: Build Project
      # Code ko compile karega 
      run: cmake --build build

    - name: List Discovered Tests
      run: cd build && ctest --show-only

    - name: Run Unit Tests
      # Agar tumne CTest use kiya hai, toh yeh saare tests run karega
      run: cd build && ctest --output-on-failure --verbose -j2
    
     - name: Upload Test Results
       if: always()
       uses: actions/upload-artifact@v4
       with:
         name: test-results
         path: build/Testing/
         retention-days: 7
