name: Core Engine CI Tests

# Yeh workflow tab chalega jab koi 'feat/tensor' branch par push ya pull request karega
on:
  push:
    branches: [ "feat/tensor", "main" ]
  pull_request:
    branches: [ "feat/tensor", "main" ]

jobs:
  build-and-test:
    [cite_start]runs-on: ubuntu-latest # Kyunki project Linux (Ubuntu/Arch) par based hai 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Dependencies (CMake & Compilers)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake g++ build-essential

    - name: Configure CMake
      # Project ko build folder mein configure karega 
      run: cmake -B build -S .

    - name: Build Project
      # Code ko compile karega 
      run: cmake --build build

    - name: Run Unit Tests
      # Agar tumne CTest use kiya hai, toh yeh saare tests run karega
      run: cd build && ctest --output-on-failure
